<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Menu V2.3 (Dynamic Entry Autocomplete)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { cream: "#fffaf2", oat: "#f4eadc", clay: "#c97944", cedar: "#7b4b2a", ink: "#2f2924" },
            boxShadow: { soft: "0 20px 60px rgba(91, 60, 34, 0.10)" }
          }
        }
      };
    </script>
    <style>
      body { background: radial-gradient(circle at top left, rgba(238, 166, 94, 0.18), transparent 34rem), linear-gradient(135deg, #fffaf2 0%, #f8efe4 50%, #fffdf8 100%); }
      .wood-grain { background: linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34)), repeating-linear-gradient(105deg, rgba(201, 121, 68, 0.10) 0 1px, transparent 1px 12px), #f8efe4; }
      .dish-art { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.95) 0 30%, transparent 31%), radial-gradient(circle at 45% 45%, var(--accent-a) 0 14%, transparent 15%), radial-gradient(circle at 58% 52%, var(--accent-b) 0 13%, transparent 14%), radial-gradient(circle at 42% 60%, var(--accent-c) 0 8%, transparent 9%), radial-gradient(circle at 50% 50%, #f5e3cd 0 55%, #c97944 56% 62%, transparent 63%); }
    </style>
  </head>
  <body class="min-h-screen text-ink antialiased">
    <div id="root">
      <div style="max-width: 720px; margin: 48px auto; padding: 24px; border-radius: 8px; background: rgba(255,255,255,.72); font-family: sans-serif; color: #2f2924;">
        <h1 style="font-size: 32px; margin: 0 0 12px;">Connecting to Cloud...</h1>
        <p style="line-height: 1.6; margin: 0;">Initializing high-performance digital pipeline...</p>
      </div>
    </div>

    <script>
      (function () {
        const h = React.createElement;
        const { useEffect, useMemo, useState } = React;

        // =========================================================
        // 🔴 SECURITY GATEWAY: ATTACH YOUR SECURE NETWORK CREDENTIALS 🔴
        // =========================================================
        const SUPABASE_URL = 'https://fawxcdheypnfnlxzcwrl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0ymWg7r2cAB-A0fQ7Hm4lQ_tV0Mcx1_';
        const FAMILY_EMAIL = 'ourhome@menu.com';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const aliases = {
          "spring onion": "Scallion", scallions: "Scallion", scallion: "Scallion", "green onion": "Scallion", "green onions": "Scallion", "小葱": "Scallion", "青葱": "Scallion", "葱": "Scallion",
          "garlic clove": "Garlic", garlic: "Garlic", "蒜": "Garlic", "大蒜": "Garlic", ginger: "Ginger", "姜": "Ginger", oil: "Oil", "cooking oil": "Oil", salt: "Salt", "table salt": "Salt",
          tomato: "Tomato", tomatoes: "Tomato", "番茄": "Tomato", "西红柿": "Tomato", egg: "Egg", eggs: "Egg", "鸡蛋": "Egg", "green pepper": "Green Pepper", "bell pepper": "Green Pepper",
          pepper: "Green Pepper", "青椒": "Green Pepper", "pork loin": "Pork Loin", pork: "Pork Loin", "里脊肉": "Pork Loin", tofu: "Tofu", "豆腐": "Tofu", "hou zhu sauce": "Hou Zhu Sauce",
          "houzhu sauce": "Hou Zhu Sauce", "侯柱酱": "Hou Zhu Sauce",
        };

        const emptyForm = { name: "", tags: "Chinese, Dinner", mainIngredients: "Tofu, 300, g\nHou Zhu Sauce, 1, tbsp", pantryIngredients: "Scallion, 1, stalk\nGarlic, 2, clove\nOil, 1, tsp", preparation: "Pat the tofu dry.\nSlice scallion.", cooking: "Sear tofu until golden.\nAdd sauce and simmer." };
        const emptyInventoryForm = { name: "", qty: "", unit: "g" };

        function titleCase(text) { return (text || "").trim().toLowerCase().split(/\s+/).filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" "); }
        function canonicalName(name) { const key = (name || "").trim().toLowerCase(); return aliases[key] || titleCase(name); }
        function normalizeUnit(unit) {
          const v = (unit || "").trim().toLowerCase();
          const ua = { piece: "pcs", pieces: "pcs", pc: "pcs", 个: "pcs", gram: "g", grams: "g", 克: "g", stalks: "stalk", 根: "stalk", cloves: "clove", 瓣: "clove", tablespoon: "tbsp", tablespoons: "tbsp", tbsp: "tbsp", teaspoon: "tsp", teaspoons: "tsp", tsp: "tsp" };
          return ua[v] || v || "unit";
        }
        function ingredient(name, qty, unit, role) { return { name: canonicalName(name), qty: Number(qty), unit: normalizeUnit(unit), role: role || "main" }; }
        function roundQty(qty) { return Math.round(qty * 100) / 100; }
        function formatAmount(qty, unit) { const r = roundQty(Number(qty)); return (Number.isInteger(r) ? r : r.toFixed(2).replace(/0+$/, "").replace(/\.$/, "")) + " " + unit; }
        function parseTags(text) { return Array.from(new Set((text || "").split(",").map(t => titleCase(t)).filter(Boolean))); }
        function parseIngredients(text, role) { return text.split("\n").map(l => l.trim()).filter(Boolean).map(l => { const p = l.split(",").map(part => part.trim()); if (p.length < 3) return null; const q = Number(p[1]); if (!p[0] || !Number.isFinite(q) || q <= 0 || !p[2]) return null; return ingredient(p[0], q, p[2], role); }).filter(Boolean); }
        function generateSubtitle(name, ingredients) { const names = ingredients.slice(0, 3).map(item => item.name); if (names.length === 0) return "A simple home-style dish for two"; const last = names.pop(); return "Home-style " + name.toLowerCase() + (names.length ? " with " + names.join(", ") + " and " : " with ") + last; }

        function ensureArray(val) {
          if (Array.isArray(val)) return val;
          if (typeof val === 'string') return val.split('\n').map(l => l.trim()).filter(Boolean);
          return [];
        }

        function App() {
          const [session, setSession] = useState(null);
          const [password, setPassword] = useState("");
          const [authError, setAuthError] = useState("");
          const [isDataLoading, setIsDataLoading] = useState(true);

          const [masterIngredients, setMasterIngredients] = useState([]);
          const [recipes, setRecipes] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [cookingHistory, setCookingHistory] = useState([]);

          const [orders, setOrders] = useState([]);
          const [selectedDish, setSelectedDish] = useState(null);
          const [loggingDish, setLoggingDish] = useState(null);
          const [isFormOpen, setIsFormOpen] = useState(false);
          const [searchQuery, setSearchQuery] = useState("");

          const [formIngredients, setFormIngredients] = useState([]);
          const [formName, setFormName] = useState("");
          const [formTags, setFormTags] = useState("Chinese, Dinner");
          const [formPrep, setFormPrep] = useState("");
          const [formCook, setFormCook] = useState("");
          const [formError, setFormError] = useState("");

          const [inventoryForm, setInventoryForm] = useState(emptyInventoryForm);

          useEffect(() => {
            supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
            supabase.auth.onAuthStateChange((_event, session) => setSession(session));
          }, []);

          useEffect(() => {
            if (!session) return;
            async function bootstrapCloudBistro() {
              setIsDataLoading(true);
              try {
                const [ingRes, recRes, invRes, histRes] = await Promise.all([
                  supabase.from('ingredients').select('*').order('name'),
                  supabase.from('recipes').select('*, recipe_ingredients(*, ingredients(*))'),
                  supabase.from('pantry_inventory').select('*, ingredients(*)'),
                  supabase.from('cooking_history').select('*')
                ]);

                if (ingRes.data) setMasterIngredients(ingRes.data);
                if (invRes.data) {
                  setInventory(invRes.data.filter(i => i.ingredients).map(i => ({
                    id: i.id, ingredient_id: i.ingredient_id, name: i.ingredients.name, qty: Number(i.qty), unit: i.ingredients.unit
                  })));
                }
                if (histRes.data) setCookingHistory(histRes.data);
                if (recRes.data) {
                  setRecipes(recRes.data.map(r => {
                    const parsedIngs = (r.recipe_ingredients || []).filter(ri => ri.ingredients).map(ri => ({
                      id: ri.ingredients.id, name: ri.ingredients.name, qty: Number(ri.qty), unit: ri.ingredients.unit, role: ri.ingredients.role, calories_per_unit: Number(ri.ingredients.calories_per_unit)
                    }));
                    return {
                      id: Number(r.id), name: r.name, subtitle: r.subtitle, time: r.time_estimate, tags: ensureArray(r.tags), accent: ensureArray(r.accent).length >= 3 ? r.accent : ["#d78a55", "#8fbc8f", "#f0c36a"], preparation: ensureArray(r.preparation), cooking: ensureArray(r.cooking), custom: r.is_custom,
                      mainIngredients: parsedIngs.filter(i => i.role === 'main'), pantryIngredients: parsedIngs.filter(i => i.role === 'pantry')
                    };
                  }));
                }
              } catch (e) {
                console.error("Initialization fault:", e);
              } finally {
                setIsDataLoading(false);
              }
            }
            bootstrapCloudBistro();
          }, [session]);

          async function handleLogin(e) {
            e.preventDefault(); setAuthError("");
            const { error } = await supabase.auth.signInWithPassword({ email: FAMILY_EMAIL, password });
            if (error) setAuthError("Incorrect system passphrase. Verification aborted 🐾");
          }

          const getRecipeStats = (recipeId) => {
            const logs = cookingHistory.filter(h => Number(h.recipe_id) === Number(recipeId));
            if (logs.length === 0) return { avg: null, count: 0 };
            const scores = logs.map(l => Number(l.rating));
            if (scores.length === 1) return { avg: roundQty(scores[0]), count: 1 };
            if (scores.length === 2) return { avg: roundQty((scores[0] + scores[1]) / 2), count: 2 };
            const sorted = [...scores].sort((a, b) => a - b);
            sorted.pop(); sorted.shift();
            return { avg: roundQty(sorted.reduce((a, b) => a + b, 0) / sorted.length), count: scores.length };
          };

          const processedDishes = useMemo(() => {
            return recipes.map(r => {
              const allIngs = (r.mainIngredients || []).concat(r.pantryIngredients || []);
              const calories = allIngs.reduce((sum, i) => sum + (Number(i.qty) * Number(i.calories_per_unit || 0)), 0);
              const stats = getRecipeStats(r.id);
              return Object.assign({}, r, {
                calories: calories > 0 ? Math.max(40, Math.round(calories / 5) * 5) : 320,
                avgRating: stats.avg, logCount: stats.count
              });
            });
          }, [recipes, cookingHistory]);

          const visibleDishes = useMemo(() => processedDishes.filter(d => d.name.toLowerCase().includes(searchQuery.toLowerCase())), [processedDishes, searchQuery]);
          const orderItems = useMemo(() => orders.map(e => { const d = processedDishes.find(i => i.id === e.id); return d ? Object.assign({}, d, { count: e.count }) : null; }).filter(Boolean), [orders, processedDishes]);

          const requiredList = useMemo(() => {
            const map = new Map();
            orderItems.forEach(dish => {
              const all = (dish.mainIngredients || []).concat(dish.pantryIngredients || []);
              all.forEach(i => {
                const k = i.name.toLowerCase() + "-" + i.unit.toLowerCase();
                const curr = map.get(k) || { name: i.name, unit: i.unit, qty: 0 };
                curr.qty += (i.qty * dish.count); map.set(k, curr);
              });
            });
            return Array.from(map.values());
          }, [orderItems]);

          const groceryList = useMemo(() => {
            return requiredList.map(req => {
              const stock = inventory.find(i => i.name.toLowerCase() === req.name.toLowerCase() && i.unit === req.unit);
              const inStock = stock ? stock.qty : 0;
              return Object.assign({}, req, { requiredQty: req.qty, inStock, buyQty: Math.max(0, roundQty(req.qty - inStock)) });
            }).filter(item => item.buyQty > 0);
          }, [requiredList, inventory]);

          const coveredList = useMemo(() => {
            return requiredList.map(req => {
              const stock = inventory.find(i => i.name.toLowerCase() === req.name.toLowerCase() && i.unit === req.unit);
              const inStock = stock ? stock.qty : 0;
              return Object.assign({}, req, { inStock });
            }).filter(item => item.inStock >= item.qty && item.qty > 0);
          }, [requiredList, inventory]);

          const servings = orderItems.reduce((sum, item) => sum + item.count * 2, 0);

          async function resolveIngredientsPayload(rows) {
            const boundItems = [];
            for (let row of rows) {
              if (row.ingredient_id) {
                boundItems.push({ ingredient_id: row.ingredient_id, qty: Number(row.qty) });
              } else {
                const standardizedName = titleCase(row.searchQuery.trim());
                const exactMatch = masterIngredients.find(mi => mi.name.toLowerCase() === standardizedName.toLowerCase());
                if (exactMatch) {
                  boundItems.push({ ingredient_id: exactMatch.id, qty: Number(row.qty) });
                } else {
                  const { data: newIng, error } = await supabase.from('ingredients').insert([{
                    name: standardizedName, unit: normalizeUnit(row.unit), calories_per_unit: 0, role: row.role
                  }]).select().single();
                  if (!error && newIng) {
                    masterIngredients.push(newIng);
                    boundItems.push({ ingredient_id: newIng.id, qty: Number(row.qty) });
                  }
                }
              }
            }
            return boundItems;
          }

          async function submitRecipe(e) {
            e.preventDefault(); setFormError("");
            const name = formName.trim();
            const prepArr = formPrep.split('\n').map(l => l.trim()).filter(Boolean);
            const cookArr = formCook.split('\n').map(l => l.trim()).filter(Boolean);
            if (!name || formIngredients.length === 0) { setFormError("Missing crucial recipe information values."); return; }

            try {
              const ingredientLinks = await resolveIngredientsPayload(formIngredients);
              const { data: newRec, error } = await supabase.from('recipes').insert([{
                name, subtitle: generateSubtitle(name, formIngredients.map(fi => ({ name: fi.searchQuery }))), time_estimate: "15 min", tags: parseTags(formTags), accent: ["#d78a55", "#8fbc8f", "#f0c36a"], preparation: prepArr, cooking: cookArr, is_custom: true
              }]).select().single();

              if (error || !newRec) throw new Error("Insertion rejected");

              const junctionRows = ingredientLinks.map(link => ({ recipe_id: newRec.id, ingredient_id: link.ingredient_id, qty: link.qty }));
              await supabase.from('recipe_ingredients').insert(junctionRows);

              const { data: freshRecipes } = await supabase.from('recipes').select('*, recipe_ingredients(*, ingredients(*))');
              if (freshRecipes) {
                setRecipes(freshRecipes.map(r => {
                  const parsedIngs = (r.recipe_ingredients || []).filter(ri => ri.ingredients).map(ri => ({
                    id: ri.ingredients.id, name: ri.ingredients.name, qty: Number(ri.qty), unit: ri.ingredients.unit, role: ri.ingredients.role, calories_per_unit: Number(ri.ingredients.calories_per_unit)
                  }));
                  return {
                    id: Number(r.id), name: r.name, subtitle: r.subtitle, time: r.time_estimate, tags: ensureArray(r.tags), accent: ensureArray(r.accent).length >= 3 ? r.accent : ["#d78a55", "#8fbc8f", "#f0c36a"], preparation: ensureArray(r.preparation), cooking: ensureArray(r.cooking), custom: r.is_custom,
                    mainIngredients: parsedIngs.filter(i => i.role === 'main'), pantryIngredients: parsedIngs.filter(i => i.role === 'pantry')
                  };
                }));
              }
              setIsFormOpen(false); resetFormRepeater();
            } catch (err) {
              setFormError("Junction map allocation rejected.");
            }
          }

          async function handleUpdateRecipe(id, meta, incomingRows) {
            if (!window.confirm("Commit recipe alterations? ✨")) return;
            try {
              await supabase.from('recipes').update({ name: meta.name, subtitle: meta.subtitle, tags: meta.tags, preparation: meta.preparation, cooking: meta.cooking }).eq('id', id);
              await supabase.from('recipe_ingredients').delete().eq('recipe_id', id);
              
              const activeLinks = await resolveIngredientsPayload(incomingRows);
              const junctionRows = activeLinks.map(link => ({ recipe_id: id, ingredient_id: link.ingredient_id, qty: link.qty }));
              await supabase.from('recipe_ingredients').insert(junctionRows);

              const { data: freshRecipes } = await supabase.from('recipes').select('*, recipe_ingredients(*, ingredients(*))');
              if (freshRecipes) {
                setRecipes(freshRecipes.map(r => {
                  const parsedIngs = (r.recipe_ingredients || []).filter(ri => ri.ingredients).map(ri => ({
                    id: ri.ingredients.id, name: ri.ingredients.name, qty: Number(ri.qty), unit: ri.ingredients.unit, role: ri.ingredients.role, calories_per_unit: Number(ri.ingredients.calories_per_unit)
                  }));
                  return {
                    id: Number(r.id), name: r.name, subtitle: r.subtitle, time: r.time_estimate, tags: ensureArray(r.tags), accent: ensureArray(r.accent).length >= 3 ? r.accent : ["#d78a55", "#8fbc8f", "#f0c36a"], preparation: ensureArray(r.preparation), cooking: ensureArray(r.cooking), custom: r.is_custom,
                    mainIngredients: parsedIngs.filter(i => i.role === 'main'), pantryIngredients: parsedIngs.filter(i => i.role === 'pantry')
                  };
                }));
              }
              setSelectedDish(null);
            } catch (e) {
              console.error(e);
            }
          }

          async function handleDeleteRecipe(id) {
            if (!window.confirm("Permanently wipe recipe execution context? 🗑️")) return;
            await supabase.from('recipes').delete().eq('id', id);
            setRecipes(curr => curr.filter(r => r.id !== id));
            setSelectedDish(null);
          }

          async function handleAddLog(recipeId, rating, notes, cookingDate) {
            if (!window.confirm("Commit log item to timeline history? 🚀")) return false;
            const { data } = await supabase.from('cooking_history').insert([{ recipe_id: recipeId, rating, notes, cooking_date: cookingDate }]).select().single();
            if (data) {
              setCookingHistory(curr => curr.concat(data));
              return true;
            }
            return false;
          }

          async function handleAddInventory(e) {
            e.preventDefault();
            const targetIng = masterIngredients.find(mi => mi.name.toLowerCase() === inventoryForm.name.trim().toLowerCase());
            if (!targetIng || Number(inventoryForm.qty) <= 0) { alert("Please select a standardized master ingredient item first!"); return; }
            
            await supabase.from('pantry_inventory').upsert({ ingredient_id: targetIng.id, qty: Number(inventoryForm.qty) }, { onConflict: 'ingredient_id' });
            const { data: freshInv } = await supabase.from('pantry_inventory').select('*, ingredients(*)');
            if (freshInv) {
              setInventory(freshInv.filter(i => i.ingredients).map(i => ({
                id: i.id, ingredient_id: i.ingredient_id, name: i.ingredients.name, qty: Number(i.qty), unit: i.ingredients.unit
              })));
            }
            setInventoryForm(emptyInventoryForm);
          }

          function resetFormRepeater() {
            setFormName(""); setFormTags("Chinese, Dinner"); setFormPrep(""); setFormCook(""); setFormIngredients([]);
          }

          function openNewFormModal() {
            setFormIngredients([{ key: Date.now(), searchQuery: '', ingredient_id: null, qty: '', unit: 'g', role: 'main', showSuggestions: false }]);
            setIsFormOpen(true);
          }

          return h("main", { className: "mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-8 px-5 py-6 sm:px-8 lg:px-10" },
            h("header", { className: "flex flex-col gap-5 border-b border-cedar/10 pb-6 lg:flex-row lg:items-end lg:justify-between" },
              h("div", { className: "max-w-2xl" },
                h("p", { className: "mb-2 text-sm font-medium uppercase text-clay" }, "Family table"), h("h1", { className: "text-4xl font-semibold tracking-normal text-ink sm:text-5xl" }, "Family Menu"),
                h("p", { className: "mt-3 max-w-xl text-base leading-7 text-cedar/75" }, "Plan dinner via safe concurrently managed relational nodes.")
              ),
              h("div", { className: "flex flex-col gap-3 sm:items-end" },
                h("button", { onClick: openNewFormModal, className: "rounded-lg bg-ink px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-cedar" }, "Add to Menu"),
                h("div", { className: "grid grid-cols-3 gap-3 rounded-lg border border-white/70 bg-white/65 p-3 shadow-soft backdrop-blur" },
                  h(Stat, { label: "Dishes", value: orderItems.length }), h(Stat, { label: "Servings", value: servings || 0 }), h(Stat, { label: "To Buy", value: groceryList.length })
                )
              )
            ),
            h("section", { className: "grid flex-1 gap-6 lg:grid-cols-[1.2fr_.9fr]" },
              h("div", { className: "space-y-4" },
                h("div", { className: "flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between" },
                  h("div", null, h("h2", { className: "text-xl font-semibold" }, "Dinner Menu"), h("p", { className: "mt-1 text-sm text-cedar/65" }, "Standardized entry suggestions enabled.")),
                  h("input", { value: searchQuery, placeholder: "Search recipes...", onChange: (e) => setSearchQuery(e.target.value), className: "w-full rounded-lg border border-white/70 bg-white/80 px-3 py-3 text-sm outline-none sm:max-w-xs focus:border-clay" })
                ),
                h("div", { className: "grid gap-4 sm:grid-cols-2" },
                  visibleDishes.map(dish => h(DishCard, { key: dish.id, dish, onAdd: () => setOrders(c => c.find(o => o.id === dish.id) ? c.map(o => o.id === dish.id ? { id: o.id, count: o.count + 1 } : o) : c.concat({ id: dish.id, count: 1 })), onOpen: () => setSelectedDish(dish), onLogClick: () => setLoggingDish(dish) }))
                )
              ),
              h(Sidebar, { orderItems, requiredList, groceryList, coveredList, inventory, inventoryForm, setInventoryForm, masterIngredients, onAddInventory: handleAddInventory, onRemoveInventory: async (id) => { await supabase.from('pantry_inventory').delete().eq('id', id); setInventory(c => c.filter(i => i.id !== id)); }, onClear: () => setOrders([]), onUpdate: (id, delta) => setOrders(c => c.map(o => o.id === id ? { id: o.id, count: Math.max(0, o.count + delta) } : o).filter(o => o.count > 0)) })
            ),
            selectedDish && h(RecipeModal, { dish: selectedDish, historyLogs: cookingHistory.filter(l => Number(l.recipe_id) === selectedDish.id), masterIngredients, onClose: () => setSelectedDish(null), onDelete: handleDeleteRecipe, onUpdate: handleUpdateRecipe, onLogClick: () => { setLoggingDish(selectedDish); setSelectedDish(null); } }),
            loggingDish && h(LogCookingModal, { dish: loggingDish, onClose: () => setLoggingDish(null), onSaveLog: handleAddLog }),
            isFormOpen && h(AddDishModal, { formName, setFormName, formTags, setFormTags, formPrep, setFormPrep, formCook, setFormCook, formIngredients, setFormIngredients, masterIngredients, formError, onClose: () => setIsFormOpen(false), onSubmit: submitRecipe })
          );
        }

        // ==========================================
        // 🧱 NESTED SUB-COMPONENTS ENGINE BLOCK
        // ==========================================
        function IngredientRepeaterRow({ row, onChange, onRemove, masterIngredients }) {
          const suggestions = useMemo(() => {
            if (!row.searchQuery || row.ingredient_id) return [];
