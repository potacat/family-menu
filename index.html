<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Family Menu V2.2 (Cooking History Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: "#fffaf2", oat: "#f4eadc", clay: "#c97944", cedar: "#7b4b2a", ink: "#2f2924",
            },
            boxShadow: { soft: "0 20px 60px rgba(91, 60, 34, 0.10)" },
          },
        },
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(238, 166, 94, 0.18), transparent 34rem),
          linear-gradient(135deg, #fffaf2 0%, #f8efe4 50%, #fffdf8 100%);
      }
      .wood-grain {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34)),
          repeating-linear-gradient(105deg, rgba(201, 121, 68, 0.10) 0 1px, transparent 1px 12px),
          #f8efe4;
      }
      .dish-art {
        background:
          radial-gradient(circle at 50% 50%, rgba(255,255,255,.95) 0 30%, transparent 31%),
          radial-gradient(circle at 45% 45%, var(--accent-a) 0 14%, transparent 15%),
          radial-gradient(circle at 58% 52%, var(--accent-b) 0 13%, transparent 14%),
          radial-gradient(circle at 42% 60%, var(--accent-c) 0 8%, transparent 9%),

  </head>
  <body class="min-h-screen text-ink antialiased">
    <div id="root">
      <div style="max-width: 720px; margin: 48px auto; padding: 24px; border-radius: 8px; background: rgba(255,255,255,.72); font-family: sans-serif; color: #2f2924;">
        <h1 style="font-size: 32px; margin: 0 0 12px;">Connecting to Cloud...</h1>
        <p style="line-height: 1.6; margin: 0;">Initializing secure digital castle...</p>
      </div>
    </div>

    <script>
      (function () {
        const h = React.createElement;
        const { useEffect, useMemo, useState } = React;

        // =========================================================
        // 🔴 CRITICAL CONFIGURATION AREA: FILL IN YOUR CREDS 🔴
        // =========================================================
        const SUPABASE_URL = 'https://fawxcdheypnfnlxzcwrl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0ymWg7r2cAB-A0fQ7Hm4lQ_tV0Mcx1_';
        const FAMILY_EMAIL = 'ourhome@menu.com'; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const aliases = {
          "spring onion": "Scallion", scallions: "Scallion", scallion: "Scallion", "green onion": "Scallion", "green onions": "Scallion", "小葱": "Scallion", "青葱": "Scallion", "葱": "Scallion",
          "garlic clove": "Garlic", garlic: "Garlic", "蒜": "Garlic", "大蒜": "Garlic", ginger: "Ginger", "姜": "Ginger", oil: "Oil", "cooking oil": "Oil", salt: "Salt", "table salt": "Salt",
          tomato: "Tomato", tomatoes: "Tomato", "番茄": "Tomato", "西红柿": "Tomato", egg: "Egg", eggs: "Egg", "鸡蛋": "Egg", "green pepper": "Green Pepper", "bell pepper": "Green Pepper",
          pepper: "Green Pepper", "青椒": "Green Pepper", "pork loin": "Pork Loin", pork: "Pork Loin", "里脊肉": "Pork Loin", tofu: "Tofu", "豆腐": "Tofu", "hou zhu sauce": "Hou Zhu Sauce",
          "houzhu sauce": "Hou Zhu Sauce", "侯柱酱": "Hou Zhu Sauce",
        };

        const baseDishes = [
          { id: 1, name: "Tomato Egg Stir-Fry", subtitle: "Soft eggs and bright tomato with a scallion finish", time: "12 min", calories: 305, source: "Built-in Recipe (Read Only)", tags: ["Chinese", "Dinner", "Quick"], accent: ["#e85038", "#ffd36f", "#4f9b67"], mainIngredients: [{name: "Tomato", qty: 2, unit: "pcs", role:"main"}, {name: "Egg", qty: 3, unit: "pcs", role:"main"}], pantryIngredients: [{name: "Scallion", qty: 1, unit: "stalk", role:"pantry"}, {name: "Oil", qty: 1, unit: "tsp", role:"pantry"}, {name: "Salt", qty: 0.25, unit: "tsp", role:"pantry"}], preparation: ["Cut tomatoes into wedges and slice the scallion.", "Beat the eggs with a small pinch of salt until smooth."], cooking: ["Scramble the eggs in a hot pan until barely set.", "Cook tomato wedges until they release juice.", "Return eggs, fold gently, and finish with scallion."], custom: false },
          { id: 2, name: "Pepper Pork Strips", subtitle: "Green pepper with tender pork loin", time: "18 min", calories: 450, source: "Built-in Recipe (Read Only)", tags: ["Chinese", "Dinner", "Pork"], accent: ["#4f9b67", "#b66a4b", "#e7c07b"], mainIngredients: [{name: "Green Pepper", qty: 2, unit: "pcs", role:"main"}, {name: "Pork Loin", qty: 250, unit: "g", role:"main"}], pantryIngredients: [{name: "Scallion", qty: 1, unit: "stalk", role:"pantry"}, {name: "Garlic", qty: 1, unit: "clove", role:"pantry"}, {name: "Oil", qty: 1, unit: "tsp", role:"pantry"}, {name: "Salt", qty: 0.25, unit: "tsp", role:"pantry"}], preparation: ["Slice pork loin into thin strips and cut green peppers.", "Season pork lightly with salt."], cooking: ["Sear the pork quickly over high heat, set aside.", "Stir-fry green pepper strips until crisp-tender.", "Return pork, toss with scallion and garlic."], custom: false }
        ];

        const emptyForm = { name: "", tags: "Chinese, Dinner", mainIngredients: "Tofu, 300, g\nHou Zhu Sauce, 1, tbsp", pantryIngredients: "Scallion, 1, stalk\nGarlic, 2, clove\nOil, 1, tsp", preparation: "Pat the tofu dry.\nSlice scallion.", cooking: "Sear tofu until golden.\nAdd sauce and simmer." };
        const emptyInventoryForm = { name: "", qty: "", unit: "g" };

        function titleCase(text) { return (text || "").trim().toLowerCase().split(/\s+/).filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" "); }
        function canonicalName(name) { const key = (name || "").trim().toLowerCase(); return aliases[key] || titleCase(name); }
        function normalizeUnit(unit) {
          const v = (unit || "").trim().toLowerCase();
          const ua = { piece: "pcs", pieces: "pcs", pc: "pcs", 个: "pcs", gram: "g", grams: "g", 克: "g", stalks: "stalk", 根: "stalk", cloves: "clove", 瓣: "clove", tablespoon: "tbsp", tablespoons: "tbsp", tbsp: "tbsp", teaspoon: "tsp", teaspoons: "tsp", tsp: "tsp" };
          return ua[v] || v || "unit";
        }
        function ingredient(name, qty, unit, role) { return { name: canonicalName(name), qty: Number(qty), unit: normalizeUnit(unit), role: role || "main" }; }
        function roundQty(qty) { return Math.round(qty * 100) / 100; }
        function formatAmount(qty, unit) { const r = roundQty(Number(qty)); return (Number.isInteger(r) ? r : r.toFixed(2).replace(/0+$/, "").replace(/\.$/, "")) + " " + unit; }
        function parseTags(text) { return Array.from(new Set((text || "").split(",").map(t => titleCase(t)).filter(Boolean))); }
        function parseIngredients(text, role) { return text.split("\n").map(l => l.trim()).filter(Boolean).map(l => { const p = l.split(",").map(part => part.trim()); if (p.length < 3) return null; const q = Number(p[1]); if (!p[0] || !Number.isFinite(q) || q <= 0 || !p[2]) return null; return ingredient(p[0], q, p[2], role); }).filter(Boolean); }
        function generateSubtitle(name, ingredients) { const names = ingredients.slice(0, 3).map(item => item.name); if (names.length === 0) return "A simple home-style dish for two"; const last = names.pop(); return "Home-style " + name.toLowerCase() + (names.length ? " with " + names.join(", ") + " and " : " with ") + last; }

        function App() {
          const [session, setSession] = useState(null);
          const [password, setPassword] = useState("");
          const [authError, setAuthError] = useState("");
          const [isDataLoading, setIsDataLoading] = useState(true);

          const [customDishes, setCustomDishes] = useState([]);
          const [inventory, setInventory] = useState([]);
          const [calorieLookup, setCalorieLookup] = useState({});
          const [cookingHistory, setCookingHistory] = useState([]); // 🚀 Cooking History Cloud State
          
          const [orders, setOrders] = useState([]);
          const [selectedDish, setSelectedDish] = useState(null);
          const [loggingDish, setLoggingDish] = useState(null); // 🚀 Active dish being logged
          const [isFormOpen, setIsFormOpen] = useState(false);
          const [form, setForm] = useState(emptyForm);
          const [formError, setFormError] = useState("");
          const [inventoryForm, setInventoryForm] = useState(emptyInventoryForm);
          const [searchQuery, setSearchQuery] = useState("");

          useEffect(() => {
            supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
            supabase.auth.onAuthStateChange((_event, session) => setSession(session));
          }, []);

          useEffect(() => {
            if (!session) return;
            async function loadCloudData() {
              setIsDataLoading(true);
              try {
                const { data: nutr } = await supabase.from('ingredient_nutrition').select('*');
                const lookup = {};
                if (nutr) {
                  nutr.forEach(r => {
                    const k = r.name.toLowerCase();
                    if (!lookup[k]) lookup[k] = {};
                    lookup[k][r.unit.toLowerCase()] = Number(r.calories_per_unit);
                  });
                }
                setCalorieLookup(lookup);

                const { data: rec } = await supabase.from('recipes').select('*, recipe_ingredients(*)');
                if (rec) {
                  const mappedDishes = rec.map(r => ({
                    id: Number(r.id), name: r.name, subtitle: r.subtitle, time: r.time_estimate, tags: r.tags, accent: r.accent, preparation: r.preparation, cooking: r.cooking, custom: r.is_custom,
                    mainIngredients: r.recipe_ingredients.filter(i => i.role === 'main').map(i => ({ name: i.name, qty: Number(i.qty), unit: i.unit, role: 'main' })),
                    pantryIngredients: r.recipe_ingredients.filter(i => i.role === 'pantry').map(i => ({ name: i.name, qty: Number(i.qty), unit: i.unit, role: 'pantry' }))
                  }));
                  setCustomDishes(mappedDishes);
                }

                const { data: inv } = await supabase.from('pantry_inventory').select('*');
                if (inv) setInventory(inv.map(i => ({ name: i.name, qty: Number(i.qty), unit: i.unit, role: 'pantry' })));

                // 🚀 Fetch cooking history records from cloud
                const { data: hist } = await supabase.from('cooking_history').select('*');
                if (hist) setCookingHistory(hist.map(h => ({ id: h.id, recipe_id: Number(h.recipe_id), rating: Number(h.rating), notes: h.notes, cooking_date: h.cooking_date })));

              } catch (e) {
                console.error(e);
              } finally {
                setIsDataLoading(false);
              }
            }
            loadCloudData();
          }, [session]);

          async function handleLogin(e) {
            e.preventDefault(); setAuthError("");
            const { error } = await supabase.auth.signInWithPassword({ email: FAMILY_EMAIL, password });
            if (error) setAuthError("Incorrect code. Password does not match 🐾");
          }

          const estimateCalories = (ingredients) => {
            return ingredients.reduce((sum, item) => {
              const key = item.name.toLowerCase(); const unit = item.unit.toLowerCase();
              if (calorieLookup[key] && calorieLookup[key][unit] !== undefined) return sum + calorieLookup[key][unit] * item.qty;
              if (unit === "g") return sum + item.qty;
              if (unit === "pcs") return sum + item.qty * 35;
              return sum + item.qty * 20;
            }, 0);
          };

          // 🚀 Hardcore Trimmed-Mean Scoring Logic
          const getRecipeStats = (recipeId) => {
            const matchLogs = cookingHistory.filter(h => Number(h.recipe_id) === Number(recipeId));
            const totalLogs = matchLogs.length;
            if (totalLogs === 0) return { avg: null, count: 0 };
            
            const scores = matchLogs.map(h => h.rating);
            if (totalLogs === 1) return { avg: roundQty(scores[0]), count: 1 };
            if (totalLogs === 2) return { avg: roundQty((scores[0] + scores[1]) / 2), count: 2 };
            
            // 3 or more: drop one min and one max
            const sorted = [...scores].sort((a, b) => a - b);
            sorted.pop();   // drop max
            sorted.shift(); // drop min
            const sum = sorted.reduce((a, b) => a + b, 0);
            return { avg: roundQty(sum / sorted.length), count: totalLogs };
          };

          const dishes = useMemo(() => baseDishes.concat(customDishes).map(d => {
            const all = (d.mainIngredients || []).concat(d.pantryIngredients || []);
            const stats = getRecipeStats(d.id);
            return Object.assign({}, d, { 
              calories: Math.max(40, Math.round(estimateCalories(all) / 5) * 5),
              avgRating: stats.avg,
              logCount: stats.count
            });
          }), [customDishes, calorieLookup, cookingHistory]);

          const visibleDishes = useMemo(() => dishes.filter(d => (d.name || "").toLowerCase().includes(searchQuery.toLowerCase())), [dishes, searchQuery]);
          const orderItems = useMemo(() => orders.map(e => { const d = dishes.find(i => i.id === e.id); return d ? Object.assign({}, d, { count: e.count }) : null; }).filter(Boolean), [orders, dishes]);
          
          const requiredList = useMemo(() => {
            const expanded = [];
            orderItems.forEach(dish => {
              const all = (dish.mainIngredients || []).concat(dish.pantryIngredients || []);
              all.forEach(item => expanded.push(Object.assign({}, item, { qty: item.qty * dish.count })));
            });
            const map = new Map();
            expanded.forEach(item => {
              const k = item.name.toLowerCase() + "-" + item.unit.toLowerCase();
              const curr = map.get(k) || { name: item.name, unit: item.unit, qty: 0 };
              curr.qty += item.qty; map.set(k, curr);
            });
            return Array.from(map.values());
          }, [orderItems]);

          const groceryList = useMemo(() => {
            return requiredList.map(req => {
              const stock = inventory.find(i => i.name.toLowerCase() === req.name.toLowerCase() && i.unit === req.unit);
              const inStock = stock ? stock.qty : 0;
              return Object.assign({}, req, { requiredQty: req.qty, inStock, buyQty: Math.max(0, roundQty(req.qty - inStock)) });
            }).filter(item => item.buyQty > 0);
          }, [requiredList, inventory]);

          const coveredList = useMemo(() => {
            return requiredList.map(req => {
              const stock = inventory.find(i => i.name.toLowerCase() === req.name.toLowerCase() && i.unit === req.unit);
              const inStock = stock ? stock.qty : 0;
              return Object.assign({}, req, { inStock });
            }).filter(item => item.inStock >= item.qty && item.qty > 0);
          }, [requiredList, inventory]);

          const servings = orderItems.reduce((sum, item) => sum + item.count * 2, 0);

          function updateDish(id, delta) { setOrders(curr => curr.map(item => item.id === id ? Object.assign({}, item, { count: Math.max(0, item.count + delta) }) : item).filter(item => item.count > 0)); }
          function addDish(id) { setOrders(curr => { const e = curr.find(i => i.id === id); return e ? curr.map(i => i.id === id ? Object.assign({}, i, { count: i.count + 1 }) : i) : curr.concat({ id, count: 1 }); }); }

          async function submitDish(event) {
            event.preventDefault();
            const name = form.name.trim(); const parsedMain = parseIngredients(form.mainIngredients, "main"); const parsedPantry = parseIngredients(form.pantryIngredients, "pantry");
            const tags = parseTags(form.tags); const preparation = form.preparation.split("\n").map(l => l.trim()).filter(Boolean); const cooking = form.cooking.split("\n").map(l => l.trim()).filter(Boolean);
            if (!name || parsedMain.length === 0) { setFormError("Please enter at least a recipe name and one main ingredient!"); return; }

            const { data: newRec, error: rErr } = await supabase.from('recipes').insert([{
              name, subtitle: generateSubtitle(name, parsedMain), time_estimate: "15 min", tags, accent: ["#d78a55", "#8fbc8f", "#f0c36a"], preparation, cooking, is_custom: true
            }]).select().single();
            if (rErr || !newRec) { setFormError("Failed to store core recipe table."); return; }

            const ingredientRows = parsedMain.concat(parsedPantry).map(i => ({ recipe_id: newRec.id, name: i.name, qty: i.qty, unit: i.unit, role: i.role }));
            await supabase.from('recipe_ingredients').insert(ingredientRows);

            setCustomDishes(curr => curr.concat({ id: Number(newRec.id), name, subtitle: newRec.subtitle, time: "15 min", tags, accent: ["#d78a55", "#8fbc8f", "#f0c36a"], preparation, cooking, custom: true, mainIngredients: parsedMain, pantryIngredients: parsedPantry }));
            setForm(emptyForm); setIsFormOpen(false); setFormError("");
          }

          async function cloudUpdateDish(id, updatedFields, allParsedIngredients) {
            try {
              const { error: rErr } = await supabase.from('recipes').update({
                name: updatedFields.name, subtitle: updatedFields.subtitle, tags: updatedFields.tags, preparation: updatedFields.preparation, cooking: updatedFields.cooking
              }).eq('id', id);
              if (rErr) return false;

              await supabase.from('recipe_ingredients').delete().eq('recipe_id', id);
              const newRows = allParsedIngredients.map(i => ({ recipe_id: id, name: i.name, qty: i.qty, unit: i.unit, role: i.role }));
              await supabase.from('recipe_ingredients').insert(newRows);

              const updatedDishObj = Object.assign({}, updatedFields, {
                id, custom: true, accent: ["#d78a55", "#8fbc8f", "#f0c36a"], time: "15 min",
                mainIngredients: allParsedIngredients.filter(i => i.role === 'main'),
                pantryIngredients: allParsedIngredients.filter(i => i.role === 'pantry')
              });
              setCustomDishes(curr => curr.map(d => d.id === id ? updatedDishObj : d));
              setSelectedDish(updatedDishObj);
              return true;
            } catch (e) {
              return false;
            }
          }

          async function cloudDeleteDish(id) {
            try {
              const { error } = await supabase.from('recipes').delete().eq('id', id);
              if (error) return;
              setCustomDishes(curr => curr.filter(d => d.id !== id));
              setOrders(curr => curr.filter(o => o.id !== id));
              setSelectedDish(null);
            } catch (e) {
              console.error(e);
            }
          }

          // 🚀 云端关系型写入：保存新的历史烹饪日志记录
          async function cloudAddCookingLog(recipeId, rating, notes, cookingDate) {
            if (window.confirm("Are you sure you want to log this cooking history? ✨")) {
              const { data, error } = await supabase.from('cooking_history').insert([{
                recipe_id: recipeId, rating: Number(rating), notes, cooking_date: cookingDate
              }]).select().single();
              
              if (!error && data) {
                setCookingHistory(curr => curr.concat({ id: data.id, recipe_id: Number(data.recipe_id), rating: Number(data.rating), notes: data.notes, cooking_date: data.cooking_date }));
                setLoggingDish(null);
                return true;
              }
            }
            return false;
          }

          async function addInventory(event) {
            event.preventDefault(); const qty = Number(inventoryForm.qty); const cName = canonicalName(inventoryForm.name); const normUnit = normalizeUnit(inventoryForm.unit);
            if (!cName || !Number.isFinite(qty) || qty <= 0) return;
            await supabase.from('pantry_inventory').insert([{ name: cName, qty, unit: normUnit }]).select().single()
              .catch(async () => await supabase.from('pantry_inventory').update({ qty, unit: normUnit }).eq('name', cName));
            
            const { data: refreshed } = await supabase.from('pantry_inventory').select('*');
            if (refreshed) setInventory(refreshed.map(i => ({ name: i.name, qty: Number(i.qty), unit: i.unit, role: 'pantry' })));
            setInventoryForm(emptyInventoryForm);
          }

          async function removeInventoryItem(name) {
            await supabase.from('pantry_inventory').delete().eq('name', name);
            setInventory(curr => curr.filter(i => i.name.toLowerCase() !== name.toLowerCase()));
          }

          if (!session) {
            return h("div", { className: "fixed inset-0 z-50 grid place-items-center bg-cream/95 px-4 backdrop-blur-md" },
              h("form", { onSubmit: handleLogin, className: "w-full max-w-md rounded-2xl border border-cedar/10 bg-white p-8 shadow-soft text-center" },
                h("p", { className: "text-sm font-medium uppercase tracking-wider text-clay mb-2" }, "🔐 Private Domain"),
                h("h2", { className: "text-3xl font-semibold text-ink tracking-tight mb-4" }, "potacat's Bistro"),
                h("p", { className: "text-sm text-cedar/70 mb-6 leading-relaxed" }, "This is a private culinary castle for the two of us.\nPlease enter the family pass code."),
                h("input", { type: "password", value: password, placeholder: "Enter anniversary password...", onChange: (e) => setPassword(e.target.value), className: "w-full text-center rounded-xl border border-cedar/15 bg-cream px-4 py-3 text-base outline-none tracking-widest focus:border-clay focus:ring-4 focus:ring-clay/15 mb-4" }),
                authError && h("p", { className: "text-sm text-red-600 mb-4 font-medium" }, authError),
                h("button", { type: "submit", className: "w-full rounded-xl bg-ink px-4 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-cedar" }, "Open the Gate 🚪")
              )
            );
          }

          if (isDataLoading) return h("div", { className: "grid min-h-screen place-items-center text-xl font-semibold text-clay animate-pulse" }, "Synchronizing with cloud fortress...");

          return h("main", { className: "mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-8 px-5 py-6 sm:px-8 lg:px-10" },
            h("header", { className: "flex flex-col gap-5 border-b border-cedar/10 pb-6 lg:flex-row lg:items-end lg:justify-between" },
              h("div", { className: "max-w-2xl" },
                h("p", { className: "mb-2 text-sm font-medium uppercase text-clay" }, "Family table"), h("h1", { className: "text-4xl font-semibold tracking-normal text-ink sm:text-5xl" }, "Family Menu"),
                h("p", { className: "mt-3 max-w-xl text-base leading-7 text-cedar/75" }, "Plan dinner from cloud relational database. Tracking secure pantry stock live.")
              ),
              h("div", { className: "flex flex-col gap-3 sm:items-end" },
                h("button", { onClick: () => setIsFormOpen(true), className: "rounded-lg bg-ink px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-cedar" }, "Add to Menu"),
                h("div", { className: "grid grid-cols-3 gap-3 rounded-lg border border-white/70 bg-white/65 p-3 shadow-soft backdrop-blur" },
                  h(Stat, { label: "Dishes", value: orderItems.length }), h(Stat, { label: "Servings", value: servings || 0 }), h(Stat, { label: "To Buy", value: groceryList.length })
                )
              )
            ),
            h("section", { className: "grid flex-1 gap-6 lg:grid-cols-[1.2fr_.9fr]" },
              h("div", { className: "space-y-4" },
                h("div", { className: "flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between" },
                  h("div", null, h("h2", { className: "text-xl font-semibold" }, "Dinner Menu"), h("p", { className: "mt-1 text-sm text-cedar/65" }, "Click recipe name to customize or record cooking logs.")),
