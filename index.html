        async function handleChallengeSubmit(e) {
          e.preventDefault(); setChallengeError("");
          const { data, error } = await supabase.auth.signInWithPassword({
            email: FAMILY_EMAIL, password: challengePassword
          });
          if (error) { setChallengeError("Incorrect administrative password code."); return; }
          if (data.session) {
            setSession(data.session);
            setChallengeModalOpen(false);
            if (pendingAction) { pendingAction(); setPendingAction(null); }
          }
        }

        const getRecipeStats = (recipeId) => {
          const logs = ensureArray(cookingHistory).filter(h => Number(h.recipe_id) === Number(recipeId));
          if (logs.length === 0) return { avg: null, count: 0 };
          const scores = logs.map(l => Number(l.rating));
          if (scores.length === 1) return { avg: roundQty(scores[0]), count: 1 };
          if (scores.length === 2) return { avg: roundQty((scores[0] + scores[1]) / 2), count: 2 };
          const sorted = [...scores].sort((a, b) => a - b);
          sorted.pop(); sorted.shift();
          return { avg: roundQty(sorted.reduce((a, b) => a + b, 0) / sorted.length), count: scores.length };
        };

          return ensureArray(recipes).map(r => {

            const stats = getRecipeStats(r.id);
            return Object.assign({}, r, {
              calories: calories > 0 ? Math.max(40, Math.round(calories / 5) * 5) : 320,

              ),
              viewMode === "menu" ? h("div", { className: "grid gap-4 sm:grid-cols-2" },
                ensureArray(visibleDishes).map(dish => h(DishCard, { key: dish.id, dish, onAdd: () => setOrders(c => c.find(o => o.id === dish.id) ? c.map(o => o.id === dish.id ? { id: o.id, count: o.count + 1 } : o) : c.concat({ id: dish.id, count: 1 })), onOpen: () => setSelectedDish(dish), onLogClick: () => executeSecureAction(() => setLoggingDish(dish)) })) // 📌 Intercepted prior to logging pop-up
              ) : h(MainPaneInventoryModule, { inventory, inventoryForm, setInventoryForm, masterIngredients, editingInventoryId, editingInventoryQty, setEditingInventoryIdQty, onAddInventory: handleAddInventorySecure, onRemoveInventory: (id) => executeSecureAction(() => handleRemoveInventorySecure(id)), onEditInventory: (item) => executeSecureAction(() => { setEditingInventoryId(item.id); setEditingInventoryIdQty(String(item.qty)); }), onCommitInlineEdit: () => executeSecureAction(commitInlineInventoryEdit), onCancelInlineEdit: () => setEditingInventoryId(null) })
            ),
            h(Sidebar, { viewMode, orderItems, requiredList, groceryList, coveredList, onClear: () => setOrders([]), onUpdate: (id, delta) => setOrders(c => ensureArray(c).map(o => o.id === id ? { id: o.id, count: Math.max(0, o.count + delta) } : o).filter(o => o.count > 0)), onSubmitCart: () => setIsCheckoutOpen(true) })
          ),
          selectedDish && h(RecipeModal, { dish: selectedDish, historyLogs: ensureArray(cookingHistory).filter(l => Number(l.recipe_id) === selectedDish.id), masterIngredients, executeSecureAction, onClose: () => setSelectedDish(null), onDelete: handleDeleteRecipeSecure, onUpdate: handleUpdateRecipeSecure, onLogClick: () => setLoggingDish(selectedDish), onDeleteLog: handleDeleteLogSecure }),
          loggingDish && h(LogCookingModal, { dish: loggingDish, onClose: () => setLoggingDish(null), onSaveLog: handleAddLogSecure }),
          isFormOpen && h(AddDishModal, { formName, setFormName, formOriginalName, setFormOriginalName, formTags, setFormTags, formPrep, setFormPrep, formCook, setFormCook, formIngredients, setFormIngredients, masterIngredients, formError, onClose: () => setIsFormOpen(false), onSubmit: handleSaveNewRecipe }),
          isCheckoutOpen && h(CheckoutModal, { onClose: () => setIsCheckoutOpen(false), onConfirm: triggerOrderSubmission }),
          challengeModalOpen && h("div", { className: "fixed inset-0 z-[100] grid place-items-center bg-ink/50 backdrop-blur-sm" },
            h("form", { onSubmit: handleChallengeSubmit, className: "bg-cream p-6 rounded-xl shadow-soft max-w-sm w-full border text-center" },
              h("h3", { className: "text-lg font-bold mb-2" }, "Administrative Override Required"),
              h("p", { className: "text-xs text-cedar/65 mb-4" }, "Please supply the private anniversary pass code to commit database alteration changes."),
              h("input", { type: "password", value: challengePassword, onChange: (e) => setChallengeChallengePassword(e.target.value), placeholder: "Password...", className: "w-full p-2.5 rounded-lg border text-center mb-3 outline-none" }),
              challengeError && h("p", { className: "text-xs text-red-600 font-bold mb-3" }, challengeError),
              h("div", { className: "flex justify-end gap-2" },
                h("button", { type: "button", onClick: () => setChallengeModalOpen(false), className: "px-3 py-1.5 bg-white text-xs rounded" }, "Cancel"),
                h("button", { type: "submit", className: "px-3 py-1.5 bg-clay text-white text-xs rounded font-semibold" }, "Authorize")
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
